<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment status</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <main class="page narrow">
    <section class="card">
      <div class="badge">Return</div>
      <h1>Bank payment result</h1>
      <p id="statusText" class="lead">Checking result…</p>
      <div id="details" class="notice hidden"></div>

      <div class="actions">
        <a class="primary buttonlike" href="./index.html">Back to home</a>
      </div>
    </section>
  </main>

  <script>
    const qs = new URLSearchParams(location.search);
    const provider = qs.get('provider') || 'santander';
    const status = qs.get('status') || 'unknown';
    const orderId = qs.get('orderId') || 'POC-1001';
    const amount = qs.get('amount') || '25.00';

    const statusText = document.getElementById('statusText');
    const details = document.getElementById('details');

    if (status === 'success') {
      statusText.textContent = 'Payment approved.';
      details.textContent = `Provider: ${provider} · Order: ${orderId} · Amount: $${amount}`;
      details.classList.remove('hidden');
    } else if (status === 'cancelled') {
      statusText.textContent = 'Payment was cancelled.';
      details.textContent = `Provider: ${provider} · Order: ${orderId}`;
      details.classList.remove('hidden');
    } else {
      statusText.textContent = 'Payment result not available.';
    }
  </script>
</body>
</html>
