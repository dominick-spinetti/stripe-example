<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CXone Guide + Stripe POC</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="badge">Demo POC</div>
      <h1>CXone Guide + Stripe test payment</h1>
      <p class="lead">
        This page hosts the Guide widget and a demo payment launcher.
      </p>

      <div class="card">
        <h2>Quick test</h2>
        <p>Launch the payment page directly or use Guide to send people there.</p>

        <div class="grid">
          <label>
            Customer name
            <input id="customerName" value="Jenny Rosen" />
          </label>

          <label>
            Email
            <input id="email" type="email" value="jenny.rosen@example.com" />
          </label>

          <label>
            Order ID
            <input id="orderId" value="POC-1001" />
          </label>

          <label>
            Amount (USD)
            <input id="amount" type="number" min="1" step="0.01" value="25.00" />
          </label>
        </div>

        <div class="actions">
          <button id="openPaymentPage" class="primary">Open payment page</button>
          <button id="openGuide" class="secondary">Open Guide</button>
        </div>

        <p class="hint">
          Tip: once your Guide channel is ready, the bot button can send users to the same payment page URL.
        </p>
      </div>
    </section>
  </main>

  <script src="./assets/config.js"></script>
  <script src="./assets/site.js"></script>

<script>
(function(n,u){
    window.CXoneDfo=n,
    window[n]=window[n]||function(){(window[n].q=window[n].q||[]).push(arguments)},window[n].u=u,
    e=document.createElement("script"),e.type="module",e.src=u+"?"+Math.round(Date.now()/1e3/3600),
    document.head.appendChild(e)
    })('cxone','https://web-modules-de-na1.niceincontact.com/loader/1/loader.js');

cxone('init', '1792');
cxone('guide','init');
</script>
  
</body>
</html>
